# macOS-specific configuration
font_family      family="Operator Mono Lig"
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size        16.0

# Layouts and remote control
enabled_layouts       grid, vertical, fat, stack
allow_remote_control  yes

# Window border colors (matches tab bar theme)
active_border_color       #58a6ff
inactive_border_color     #161b22

# Window title bar (per-panel)
window_title_bar          top
window_title_bar_min_windows 2

# Open new panel: evaluate aspect ratio first, then open window
map cmd+enter combine : kitten smart_layout.py : launch --cwd=current --type=window

# Switch tabs with Cmd+number
map cmd+1 goto_tab 1
map cmd+2 goto_tab 2
map cmd+3 goto_tab 3
map cmd+4 goto_tab 4
map cmd+5 goto_tab 5
map cmd+6 goto_tab 6
map cmd+7 goto_tab 7
map cmd+8 goto_tab 8
map cmd+9 goto_tab 9

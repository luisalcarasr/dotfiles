# macOS-specific configuration
font_family      family="Operator Mono Lig"
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size        16.0

# Layouts and remote control
enabled_layouts       grid, vertical, fat, stack
allow_remote_control  yes

# Window border colors (matches tab bar theme)
active_border_color       #58a6ff
inactive_border_color     #161b22

# Window title bar (per-panel)
window_title_bar          top
window_title_bar_min_windows 2

# Navigate between panels (vim-like)
map cmd+h neighboring_window left
map cmd+j neighboring_window down
map cmd+k neighboring_window up
map cmd+l neighboring_window right

# Move panels (vim-like)
map cmd+shift+h move_window left
map cmd+shift+j move_window down
map cmd+shift+k move_window up
map cmd+shift+l move_window right

# Switch tabs with Cmd+number
map cmd+1 goto_tab 1
map cmd+2 goto_tab 2
map cmd+3 goto_tab 3
map cmd+4 goto_tab 4
map cmd+5 goto_tab 5
map cmd+6 goto_tab 6
map cmd+7 goto_tab 7
map cmd+8 goto_tab 8
map cmd+9 goto_tab 9

# Move current panel to tab N with Cmd+Ctrl+number
map cmd+ctrl+1 remote_control detach-window --self --target-tab index:0
map cmd+ctrl+2 remote_control detach-window --self --target-tab index:1
map cmd+ctrl+3 remote_control detach-window --self --target-tab index:2
map cmd+ctrl+4 remote_control detach-window --self --target-tab index:3
map cmd+ctrl+5 remote_control detach-window --self --target-tab index:4
map cmd+ctrl+6 remote_control detach-window --self --target-tab index:5
map cmd+ctrl+7 remote_control detach-window --self --target-tab index:6
map cmd+ctrl+8 remote_control detach-window --self --target-tab index:7
map cmd+ctrl+9 remote_control detach-window --self --target-tab index:8

# Tab bar
tab_bar_edge              bottom
tab_bar_style             powerline
tab_powerline_style       slanted
tab_bar_min_tabs          1
tab_bar_align             left
tab_title_template        " {index}: {title} "
active_tab_title_template " {index}: {title} "

active_tab_foreground     #0d1117
active_tab_background     #58a6ff
active_tab_font_style     bold

inactive_tab_foreground   #6e7681
inactive_tab_background   #161b22
inactive_tab_font_style   normal

tab_bar_background        #010409
tab_bar_margin_color      #010409

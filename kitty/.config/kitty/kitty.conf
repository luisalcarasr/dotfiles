# OS-specific configuration (fonts, keybindings, etc.)
include ${KITTY_OS}.conf

cursor_shape          block
cursor                #abb2bf
cursor_blink_interval 0
shell_integration     disabled

placement_strategy    top-left
background_opacity    1

# URL handling
url_prefixes http https file ftp

# Mouse actions for URLs
mouse_map cmd+left click ungrabbed,grabbed copy_url_to_clipboard
mouse_map shift+left click ungrabbed,grabbed mouse_click_url

# GitHub Dark
cursor                #73b7f2
background            #0d1117
foreground            #e6edf3
selection_background  #1f6feb
selection_foreground  #ffffff
color0 #484f58
color1 #ff7b72
color2 #3fb950
color3 #d29922
color4 #58a6ff
color5 #bc8cff
color6 #39c5cf
color7 #b1bac4
color8 #6e7681
color9 #ffa198
color10 #56d364
color11 #e3b341
color12 #79c0ff
color13 #d2a8ff
color14 #56d4dd
color15 #f0f6fc


# Tab bar
tab_bar_edge              bottom
tab_bar_style             powerline
tab_powerline_style       slanted
tab_bar_min_tabs          1
tab_bar_align             left
tab_title_template        " {index}: {title} "
active_tab_title_template " {index}: {title} "

active_tab_foreground     #0d1117
active_tab_background     #58a6ff
active_tab_font_style     bold

inactive_tab_foreground   #6e7681
inactive_tab_background   #161b22
inactive_tab_font_style   normal

tab_bar_background        #010409
tab_bar_margin_color      #010409


<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "fonts.dtd">
<fontconfig>

  <!-- Default font settings updated to Adwaita Nerd -->
  <match>
    <test name="family" compare="eq">
      <string>adwaita</string>
    </test>
    <edit name="family" mode="assign">
      <string>Adwaita Nerd</string>
    </edit>
  </match>
  <alias>
  <family>monospace</family>
  <prefer>
    <family>AdwaitaMono Nerd Font</family>
    <family>Noto Emoji</family>
   </prefer>
 </alias>
 <alias>
  <family>sans</family>
  <prefer>
    <family>Adwaita Sans</family>
   </prefer>
 </alias>
</fontconfig>
